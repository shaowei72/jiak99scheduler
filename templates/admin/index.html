{% extends "admin/index.html" %}
{% load static %}

{% block content %}
<!-- Schedule Manager Quick Access -->
<div class="module" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; margin-bottom: 20px; border-radius: 8px;">
    <div style="color: white;">
        <h2 style="color: white; margin-top: 0;">📅 Schedule Management</h2>
        <p style="margin: 10px 0; font-size: 16px;">Manage tour guide and restaurant staff schedules</p>
        <a href="/schedule/" class="button" style="background: white; color: #667eea; padding: 10px 20px; text-decoration: none; border-radius: 4px; font-weight: bold; display: inline-block;">
            Open Schedule Dashboard →
        </a>
    </div>
</div>

<!-- Account Settings -->
<div class="module" style="background: #f8f9fa; padding: 15px; margin-bottom: 20px; border-radius: 8px; border-left: 4px solid #667eea;">
    <h2 style="margin-top: 0; color: #333;">👤 Account Settings</h2>
    <ul style="list-style: none; padding: 0; margin: 0;">
        <li style="padding: 8px 0;">
            <a href="{% url 'admin:password_change' %}" style="color: #667eea; text-decoration: none; font-weight: 500;">
                🔑 Change Password
            </a>
        </li>
        <li style="padding: 8px 0;">
            <a href="{% url 'main_landing' %}" style="color: #667eea; text-decoration: none; font-weight: 500;">
                🏠 View Site
            </a>
        </li>
    </ul>
</div>

{{ block.super }}
{% endblock %}
